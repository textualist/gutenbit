site_name: gutenbit
site_description: Fast local search across Project Gutenberg's literary works.
site_url: https://gutenbit.textualist.org

repo_name: gutenbit
repo_url: https://github.com/textualist/gutenbit

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
  favicon: assets/brand/favicon.svg
  features:
    - navigation.sections
    - content.code.copy

extra_css:
  - stylesheets/extra.css

hooks:
  - docs/hooks.py

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          options:
            filters:
              - "!^_"
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI: cli.md
  - Python API: python-api.md
  - Concepts: concepts.md
  - API Reference: reference/
