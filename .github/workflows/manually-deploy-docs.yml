name: Manual Docs Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy, for example v0.1.6
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "release_tag must match vX.Y.Z"
              exit 1
              ;;
          esac

      - uses: actions/configure-pages@v5

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Build documentation
        run: uv run --extra docs zensical build --clean

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
