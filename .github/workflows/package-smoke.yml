name: Package Smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke test installed wheel
        run: |
          wheel=$(echo dist/*.whl)
          uvx --refresh --from "$wheel" gutenbit --help
          uvx --refresh --from "$wheel" gutenbit --version
